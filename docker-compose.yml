version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: medicapp-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_STORAGE_PATH=/app/data/medicapp.sqlite
    volumes:
      - medicapp_db_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        # Aquí le decimos a Vite dónde estará el backend. 
        # Como el usuario accederá desde su navegador local, 
        # la URL de la API debe ser localhost:3000.
        VITE_API_BASE_URL: http://localhost:3000/api
    container_name: medicapp-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  medicapp_db_data:
    name: medicapp_db_data
